device: cuda
th_seed: 156
np_seed: 156

unet:
  dim: [1, 128, 128]
  channel_mult: "1,  2,  4,  4"
  num_channels: 64
  num_res_blocks: 2
  num_head_channels: 32
  attention_resolutions: "32"
  dropout: 0.0
  use_new_attention_order: True
  use_scale_shift_norm: True
  class_cond: False
  num_classes:
  use_future_time_emb: True

mean_flow:
  checkpoint_path: "darcy_mean_flow/exp_1/saved_state/checkpoint_999.pt"

inference:
  total_samples_to_generate: 500
  shape_of_sample: "1,128,128"
  batch_size: 8
  save_path: "darcy_mean_flow/exp_1/gen_samples/samples.pt"
  norm_stats_dir: "darcy_mean_flow/exp_1/saved_state"

  solver_kwargs:
    t_span_kwargs:
      start: 0
      end: 1
      steps: 2
